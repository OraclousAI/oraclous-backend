extend-exclude = ["**/tests/fixtures/**"]

# Ruff config for the oraclous-backend monorepo.
# Lifted from the legacy ruff-pre-commit setup; the ruff version is pinned in
# pyproject.toml dev dependencies and in the pre-commit config (story 0b).
target-version = "py312"
line-length = 100
src = ["packages", "services", "tests"]

[lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "ASYNC",  # flake8-async
    "S",      # flake8-bandit (security)
]
ignore = []

[lint.per-file-ignores]
"**/tests/**" = ["S101"]  # assert is expected in tests (top-level and per-package)

[format]
docstring-code-format = true
