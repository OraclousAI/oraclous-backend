[project]
name = "oraclous-rebac"
version = "0.0.0"
description = "ReBAC relation types and helpers (Layer 1)."
requires-python = "==3.12.*"
dependencies = [
    "oraclous-substrate",
]

[tool.uv.sources]
oraclous-substrate = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oraclous_rebac"]
