[project]
name = "oraclous-eval"
version = "0.0.0"
description = "The shared flow-level evaluation engine (ADR-037 / E4) — one LLM-as-judge seam + a rubric-agnostic evaluator producing the typed Verdict. Generalized out of the KRS retrieval judge (#331); consumed by core/evaluate (#469), the named gate battery (#470), and KRS's retrieval rubric (a thin caller)."
requires-python = "==3.12.*"
dependencies = [
    "pydantic>=2.0,<3.0",
    "openai>=1.40,<2.0",
    # #597 (E10 eval-set): the compiler eval-set guardrails (Layer-1) reuse the importer's
    # validator (assemble_and_report) and the named gate battery (Layer-2) reuses run_battery —
    # both live in oraclous-ohm. eval depends on the manifest core it evaluates (acyclic; ohm never
    # imports eval). KRS already pulls both, so this adds no new transitive cost.
    "oraclous-ohm",
]

[tool.uv.sources]
oraclous-ohm = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oraclous_eval"]
