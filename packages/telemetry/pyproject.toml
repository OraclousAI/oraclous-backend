[project]
name = "oraclous-telemetry"
version = "0.0.0"
description = "Shared observability primitives — the degradation-alert seam (ADR-021)."
requires-python = "==3.12.*"
dependencies = [
    # ASGI type aliases for the shared correlation-id middleware (WP-6). Starlette is already a
    # transitive dependency of every service via FastAPI; declaring it here keeps the shared
    # middleware self-contained.
    "starlette>=0.37",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oraclous_telemetry"]
