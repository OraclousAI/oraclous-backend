[project]
name = "oraclous-substrate"
version = "0.0.0"
description = "Substrate seams: ReBAC client + provenance collector (Layer 1)."
requires-python = "==3.12.*"
dependencies = [
    "PyYAML>=6.0,<7.0",
    # async RLS GUC-binding seam (ADR-030 §2, oraclous_substrate.access_async) — the
    # async equivalent of the sync psycopg scoped_pg_connection, used by the async
    # SQLAlchemy services to bind app.current_organisation_id per transaction.
    "sqlalchemy[asyncio]>=2.0,<3.0",
    # governance carries the OrganisationContext both the sync seam (access.py) and the
    # async seam read; already an import edge, declared here so a standalone install resolves it.
    "oraclous-governance",
]

[tool.uv.sources]
oraclous-governance = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oraclous_substrate"]
