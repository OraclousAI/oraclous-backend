[project]
name = "oraclous-ohm"
version = "0.0.0"
description = "OHM manifest types and validators (shared)."
requires-python = "==3.12.*"
dependencies = ["pydantic>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oraclous_ohm"]
