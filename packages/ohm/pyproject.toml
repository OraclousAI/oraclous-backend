[project]
name = "oraclous-ohm"
version = "0.0.0"
description = "OHM (Oraclous Harness Manifest) — shared schema types, parsing, references, signatures, canonicalization (consumed by harness-runtime, the importer, the compiler, and execution-engine orchestration)."
requires-python = "==3.12.*"
dependencies = [
    "pydantic>=2.0,<3.0",
    "PyYAML>=6.0,<7.0",
    "cryptography>=42,<46",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oraclous_ohm"]
