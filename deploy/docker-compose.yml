# Local self-hosted substrate stack for oraclous-backend.
# Brings up the stateful substrate (Neo4j, Postgres, Redis) plus local tracing (Jaeger).
# Application-service containers are added to this file per release as those services
# are built; R0.5 needs only the substrate infrastructure.
#
# Dev-only credentials below — never used outside local development.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
# Concurrent isolated stacks (per agent / ticket) — see docker-compose.agent.yml:
#   COMPOSE_PROJECT_NAME=oraclous-ora-14 \
#     docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.agent.yml up -d
#
# Neo4j users provisioned by this stack:
#   neo4j / password  — admin (dev-only; never expose in production)
#   kgs_writer / kgs-writer-pass — publisher role; used by knowledge-graph-service (ORAA-53)
#   krs_reader / krs-reader-pass — reader role; used by knowledge-retriever-service (ORAA-53)
#
# The knowledge-graph-service reads these env vars:
#   KGS_NEO4J_URI      bolt://neo4j:7687
#   KGS_NEO4J_USER     kgs_writer
#   KGS_NEO4J_PASSWORD kgs-writer-pass   (dev); K8s secret in production
name: oraclous-backend

# Shared KGS environment (API + worker). S2 wires Neo4j + Redis/Celery for ingestion.
# Dev uses the default `neo4j` user: the kgs_writer least-privilege role (ORAA-53) is an Enterprise
# feature (GRANT ROLE), and this dev stack runs Neo4j Community. Org isolation here is property-based
# (organisation_id stamps + scoped reads), not Neo4j RBAC, so the default user is safe for dev; prod
# (Helm/Enterprise) uses kgs_writer. The service's own config default is still kgs_writer.
x-kgs-env: &kgs-env
  # Auth: dev-mode (Bearer dev-token) by default; set KGS_AUTH_MODE=jwt to consume real auth-service
  # tokens. The shared HS256 secret (AUTH_JWT_SECRET) is the SAME value the auth-service signs with.
  KGS_AUTH_MODE: "${KGS_AUTH_MODE:-dev}"
  KGS_DEV_BEARER: "dev-token"
  KGS_JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
  KGS_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
  KGS_NEO4J_URI: "bolt://neo4j:7687"
  KGS_NEO4J_USER: "neo4j"
  KGS_NEO4J_PASSWORD: "password"
  KGS_REDIS_URL: "redis://redis:6379/0"
  KGS_EMBEDDER: "hashing"
  KGS_EXTRACTOR: "null"

services:
  neo4j:
    image: neo4j:5.23-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_config_strict__validation_enabled: "false"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    networks: [substrate]

  # Idempotent one-shot container that provisions the write-capable `kgs_writer`
  # user (publisher role) and the read-only `krs_reader` user (reader role) after
  # Neo4j is healthy.  Runs `CREATE USER … IF NOT EXISTS` so re-starts are safe.
  # Dev-only credentials below; production injects KGS_NEO4J_PASSWORD via K8s secret.
  # ORAA-53 — Neo4j write-role configuration for knowledge-graph-service.
  neo4j-role-setup:
    image: neo4j:5.23-community
    depends_on:
      neo4j:
        condition: service_healthy
    entrypoint:
      - cypher-shell
      - -a
      - bolt://neo4j:7687
      - -u
      - neo4j
      - -p
      - password
      - >-
        CREATE USER kgs_writer IF NOT EXISTS
          SET PASSWORD 'kgs-writer-pass' CHANGE NOT REQUIRED;
        GRANT ROLE publisher TO kgs_writer;
        CREATE USER krs_reader IF NOT EXISTS
          SET PASSWORD 'krs-reader-pass' CHANGE NOT REQUIRED;
        GRANT ROLE reader TO krs_reader;
    networks: [substrate]
    restart: "no"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: oraclous
      POSTGRES_PASSWORD: oraclous
      POSTGRES_DB: oraclous
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oraclous -d oraclous"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [substrate]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [substrate]

  jaeger:
    image: jaegertracing/all-in-one:1.58
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [substrate]

  # R3.5 service #5 — capability-registry: Alembic schema one-shot (capability_descriptors).
  capreg-migrate:
    build:
      context: ..
      dockerfile: services/capability-registry-service/Dockerfile
    image: oraclous-capability-registry-service:${IMAGE_TAG:-dev}
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      INTERNAL_SERVICE_KEY: "${CAPABILITY_REGISTRY_INTERNAL_KEY:-dev-internal-key}"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R3.5 service #5 — capability-registry: unified capability/tool registry + execution.
  capability-registry-service:
    build:
      context: ..
      dockerfile: services/capability-registry-service/Dockerfile
    image: oraclous-capability-registry-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      INTERNAL_SERVICE_KEY: "${CAPABILITY_REGISTRY_INTERNAL_KEY:-dev-internal-key}"
      AUTH_SERVICE_URL: "http://auth-service:8000"
      # Identity seam: dev-auth (Bearer dev-token → dev org) by default; AUTH_MODE=jwt consumes the
      # real auth-service token via the shared JWT_SECRET (same value as the auth-service signs with).
      AUTH_MODE: "${CAPABILITY_REGISTRY_AUTH_MODE:-dev}"
      DEV_BEARER: "dev-token"
      JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      # Tool execution resolves credentials via the credential-broker seam. Default "fake" (key-free,
      # deterministic) so the connector smoke runs without external provider keys; set "real" to use
      # the running credential-broker over /internal/* (S5 real-broker integration).
      CREDENTIAL_BROKER_URL: "http://credential-broker-service:8000"
      CREDENTIAL_BROKER_MODE: "${CAPABILITY_REGISTRY_BROKER_MODE:-fake}"
    depends_on:
      postgres:
        condition: service_healthy
      capreg-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5-P1-S1 — schema migration one-shot (runs `alembic upgrade head`, then exits).
  kgs-migrate:
    build:
      context: ..
      dockerfile: services/knowledge-graph-service/Dockerfile
    image: oraclous-knowledge-graph-service:${IMAGE_TAG:-dev}
    environment:
      KGS_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R3.5-P1-S1 — idempotent dev-org seed one-shot (runs after migrate, then exits).
  kgs-seed:
    image: oraclous-knowledge-graph-service:${IMAGE_TAG:-dev}
    environment:
      KGS_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["python", "scripts/seed_dev.py"]
    depends_on:
      kgs-migrate:
        condition: service_completed_successfully
    restart: "no"
    profiles: [services]
    networks: [substrate]

  knowledge-graph-service:
    build:
      context: ..
      dockerfile: services/knowledge-graph-service/Dockerfile
    image: oraclous-knowledge-graph-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      <<: *kgs-env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      kgs-migrate:
        condition: service_completed_successfully
      kgs-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5-P1-S2 — Celery worker: runs the async ingest pipeline (extract -> chunk -> embed -> write).
  knowledge-graph-worker:
    image: oraclous-knowledge-graph-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    command:
      - celery
      - -A
      - oraclous_knowledge_graph_service.tasks.celery_app:celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
    environment:
      <<: *kgs-env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      kgs-migrate:
        condition: service_completed_successfully
    profiles: [services]
    networks: [substrate]

  # R3.5 service #2 — knowledge-retriever-service: READ side over the graph KGS writes.
  # Dev uses the default neo4j user (krs_reader is the Enterprise/prod role; Community has no RBAC).
  knowledge-retriever-service:
    build:
      context: ..
      dockerfile: services/knowledge-retriever-service/Dockerfile
    image: oraclous-knowledge-retriever-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      KRS_AUTH_MODE: "${KRS_AUTH_MODE:-dev}"
      KRS_DEV_BEARER: "dev-token"
      KRS_JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      KRS_NEO4J_URI: "bolt://neo4j:7687"
      KRS_NEO4J_USER: "neo4j"
      KRS_NEO4J_PASSWORD: "password"
      KRS_EMBEDDING_DIM: "512"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5 service #3 — identity/auth service: Alembic schema one-shot (agents + users + refresh).
  auth-migrate:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    image: oraclous-auth-service:${IMAGE_TAG:-dev}
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R3.5 service #3 Slice 1 — identity/auth service: users (email/password), JWT issuance, agents.
  # Issues the HS256 tokens KGS/KRS verify in jwt-mode (shared AUTH_JWT_SECRET).
  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    image: oraclous-auth-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      JWT_ALGORITHM: "HS256"
      INTERNAL_SERVICE_KEY: "${AUTH_INTERNAL_KEY:-dev-internal-key}"
      # OAuth (S5): blank client creds → /oauth/* returns 503 (boot OK); set per-provider in prod.
      # OAUTH_ENC_KEY blank → dev default 32-byte key; prod injects a real key via secret.
      OAUTH_ENC_KEY: "${OAUTH_ENC_KEY:-}"
      OAUTH_GOOGLE_CLIENT_ID: "${OAUTH_GOOGLE_CLIENT_ID:-}"
      OAUTH_GOOGLE_CLIENT_SECRET: "${OAUTH_GOOGLE_CLIENT_SECRET:-}"
      OAUTH_GITHUB_CLIENT_ID: "${OAUTH_GITHUB_CLIENT_ID:-}"
      OAUTH_GITHUB_CLIENT_SECRET: "${OAUTH_GITHUB_CLIENT_SECRET:-}"
      OAUTH_NOTION_CLIENT_ID: "${OAUTH_NOTION_CLIENT_ID:-}"
      OAUTH_NOTION_CLIENT_SECRET: "${OAUTH_NOTION_CLIENT_SECRET:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5 service #4 — credential-broker: Alembic schema one-shot (user_credentials + delegated_tokens).
  credbroker-migrate:
    build:
      context: ..
      dockerfile: services/credential-broker-service/Dockerfile
    image: oraclous-credential-broker-service:${IMAGE_TAG:-dev}
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      ENCRYPTION_KEY: "${CRED_BROKER_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}"
      INTERNAL_SERVICE_KEY: "${CRED_BROKER_INTERNAL_KEY:-dev-internal-key}"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R3.5 service #4 — credential-broker: encrypted per-user/org credential store + delegation.
  credential-broker-service:
    build:
      context: ..
      dockerfile: services/credential-broker-service/Dockerfile
    image: oraclous-credential-broker-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      # Dev-only AES-256-GCM key (32 bytes b64) + internal key → key-free smokes; prod injects secrets.
      ENCRYPTION_KEY: "${CRED_BROKER_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}"
      INTERNAL_SERVICE_KEY: "${CRED_BROKER_INTERNAL_KEY:-dev-internal-key}"
      AUTH_SERVICE_URL: "http://auth-service:8000"
      # Identity seam: dev-auth (Bearer dev-token → dev org) by default; AUTH_MODE=jwt consumes the
      # real auth-service token via the shared JWT_SECRET (same value as the auth-service signs with).
      AUTH_MODE: "${CRED_BROKER_AUTH_MODE:-dev}"
      DEV_BEARER: "dev-token"
      JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
    depends_on:
      postgres:
        condition: service_healthy
      credbroker-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5 service #6 — application-gateway: the single reverse-proxy edge fronting the services.
  # Stateless (no DB). /health is dependency-free; it routes path-prefixes to the upstreams over the
  # substrate network. Until it fronts everything, the services also stay reachable directly by port.
  application-gateway-service:
    build:
      context: ..
      dockerfile: services/application-gateway-service/Dockerfile
    image: oraclous-application-gateway-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8006:8000"
    environment:
      # upstream base URLs (the route table maps path-prefixes onto these over the substrate net)
      AUTH_SERVICE_URL: "http://auth-service:8000"
      CREDENTIAL_BROKER_URL: "http://credential-broker-service:8000"
      KNOWLEDGE_GRAPH_URL: "http://knowledge-graph-service:8000"
      KNOWLEDGE_RETRIEVER_URL: "http://knowledge-retriever-service:8000"
      CAPABILITY_REGISTRY_URL: "http://capability-registry-service:8000"
      # identity seam: dev-auth by default; AUTH_MODE=jwt verifies the real token via the shared secret
      GATEWAY_AUTH_MODE: "${GATEWAY_AUTH_MODE:-dev}"
      DEV_BEARER: "dev-token"
      JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      GATEWAY_CORS_ORIGINS: "${GATEWAY_CORS_ORIGINS:-*}"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

networks:
  substrate:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  pgdata:
