# Local self-hosted substrate stack for oraclous-backend.
# Brings up the stateful substrate (Neo4j, Postgres, Redis) plus local tracing (Jaeger).
# Application-service containers are added to this file per release as those services
# are built; R0.5 needs only the substrate infrastructure.
#
# Dev-only credentials below — never used outside local development.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
# Concurrent isolated stacks (per agent / ticket) — see docker-compose.agent.yml:
#   COMPOSE_PROJECT_NAME=oraclous-ora-14 \
#     docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.agent.yml up -d
name: oraclous-backend

services:
  neo4j:
    image: neo4j:5.23-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_config_strict__validation_enabled: "false"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    networks: [substrate]

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: oraclous
      POSTGRES_PASSWORD: oraclous
      POSTGRES_DB: oraclous
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oraclous -d oraclous"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [substrate]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [substrate]

  jaeger:
    image: jaegertracing/all-in-one:1.58
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [substrate]

networks:
  substrate:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  pgdata:
