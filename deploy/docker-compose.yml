# Local self-hosted substrate stack for oraclous-backend.
# Brings up the stateful substrate (Neo4j, Postgres, Redis) plus local tracing (Jaeger).
# Application-service containers are added to this file per release as those services
# are built; R0.5 needs only the substrate infrastructure.
#
# Dev-only credentials below — never used outside local development.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
# Concurrent isolated stacks (per agent / ticket) — see docker-compose.agent.yml:
#   COMPOSE_PROJECT_NAME=oraclous-ora-14 \
#     docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.agent.yml up -d
#
# Neo4j users provisioned by this stack:
#   neo4j / password  — admin (dev-only; never expose in production)
#   kgs_writer / kgs-writer-pass — publisher role; used by knowledge-graph-service (ORAA-53)
#   krs_reader / krs-reader-pass — reader role; used by knowledge-retriever-service (ORAA-53)
#
# The knowledge-graph-service reads these env vars:
#   KGS_NEO4J_URI      bolt://neo4j:7687
#   KGS_NEO4J_USER     kgs_writer
#   KGS_NEO4J_PASSWORD kgs-writer-pass   (dev); K8s secret in production
name: oraclous-backend

# Shared KGS environment (API + worker). S2 wires Neo4j + Redis/Celery for ingestion.
# Dev uses the default `neo4j` user: the kgs_writer least-privilege role (ORAA-53) is an Enterprise
# feature (GRANT ROLE), and this dev stack runs Neo4j Community. Org isolation here is property-based
# (organisation_id stamps + scoped reads), not Neo4j RBAC, so the default user is safe for dev; prod
# (Helm/Enterprise) uses kgs_writer. The service's own config default is still kgs_writer.
x-kgs-env: &kgs-env
  # Auth: dev-mode (Bearer dev-token) by default for the standalone smoke. The full stack runs
  # KGS_AUTH_MODE=gateway (ADR-018 edge-auth): trust the gateway's X-Principal-*/X-Organisation-Id,
  # gated on the shared X-Internal-Key. `jwt` validates a real token directly if reached un-gatewayed.
  KGS_AUTH_MODE: "${KGS_AUTH_MODE:-dev}"
  KGS_DEV_BEARER: "dev-token"
  KGS_INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
  KGS_JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
  KGS_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
  KGS_NEO4J_URI: "bolt://neo4j:7687"
  KGS_NEO4J_USER: "neo4j"
  KGS_NEO4J_PASSWORD: "password"
  KGS_REDIS_URL: "redis://redis:6379/0"
  # Slice 3 (#269): real semantic embeddings (text-embedding-3-small via OpenRouter) for similarity
  # edges AND the free-text/retrieval path — the openai_api_key + base_url below are already wired.
  KGS_EMBEDDER: "openai"
  # Free-text entity/relation extraction. "null" (default) = lexical only (:Document/:Chunk),
  # key-free CI. "openai" = LLM extraction over an OpenAI-compatible endpoint (OpenRouter) using the
  # platform key — also materialises real :Entity nodes + their relationships, linked to chunks.
  KGS_EXTRACTOR: "${KGS_EXTRACTOR:-null}"
  KGS_OPENAI_API_KEY: "${OPENROUTER_API_KEY:-}"
  KGS_OPENAI_BASE_URL: "${KGS_OPENAI_BASE_URL:-https://openrouter.ai/api/v1}"
  KGS_EXTRACTOR_MODEL: "${KGS_EXTRACTOR_MODEL:-openai/gpt-4o-mini}"
  # Max concurrent per-chunk LLM extraction calls within one document (the extractor fans out across
  # chunks). Tune up for faster free-text ingestion; OpenRouter handles the concurrency.
  KGS_EXTRACTOR_MAX_CONCURRENCY: "${KGS_EXTRACTOR_MAX_CONCURRENCY:-10}"
  # SQL-ingest TCP egress (#307, ADR-025 §1). Defaults FALSE — the secure multi-tenant posture
  # (block private/loopback/internal DB hosts), so the committed compose ships FAIL-CLOSED and a
  # multi-tenant deploy is secure by default (unset == blocked). A single-tenant / self-hosted / dev
  # stack that must reach a LOCAL/internal DB (e.g. this stack's local `postgres` for the SQL-ingest
  # fake-broker path) OPTS IN by setting KGS_SQL_INGEST_ALLOW_PRIVATE_EGRESS=true in deploy/.env. The
  # link-local / cloud-metadata range stays blocked in EITHER mode.
  KGS_SQL_INGEST_ALLOW_PRIVATE_EGRESS: "${KGS_SQL_INGEST_ALLOW_PRIVATE_EGRESS:-false}"

services:
  neo4j:
    image: neo4j:5.23-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_config_strict__validation_enabled: "false"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    networks: [substrate]

  # Idempotent one-shot: provisions the write-capable `kgs_writer` (publisher) and read-only
  # `krs_reader` (reader) Neo4j users/roles for production (Enterprise), after Neo4j is healthy.
  # `CREATE USER … IF NOT EXISTS` makes restarts safe. On the dev image (`neo4j:5.23-community`),
  # role management (`GRANT ROLE`) is an Enterprise-only command — it is skipped NON-FATALLY here,
  # because in dev KGS/KRS connect as the `neo4j` admin user (see the x-anchor) and nothing
  # `depends_on` this one-shot. So a fresh `docker compose down -v` start no longer leaves this
  # container Exited(1). Production (Enterprise) runs all four statements and the grants apply.
  # Dev-only credentials below; production injects KGS_NEO4J_PASSWORD via K8s secret. (ORAA-53.)
  neo4j-role-setup:
    image: neo4j:5.23-community
    depends_on:
      neo4j:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p password \
          "CREATE USER kgs_writer IF NOT EXISTS SET PASSWORD 'kgs-writer-pass' CHANGE NOT REQUIRED;
           CREATE USER krs_reader IF NOT EXISTS SET PASSWORD 'krs-reader-pass' CHANGE NOT REQUIRED;" \
          || echo "[neo4j-role-setup] CREATE USER step non-fatal in dev"
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p password \
          "GRANT ROLE publisher TO kgs_writer; GRANT ROLE reader TO krs_reader;" \
          || echo "[neo4j-role-setup] GRANT ROLE is Neo4j Enterprise-only; on Community KGS/KRS use the neo4j admin user in dev — skipped (non-fatal)"
        exit 0
    networks: [substrate]
    restart: "no"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: oraclous
      POSTGRES_PASSWORD: oraclous
      POSTGRES_DB: oraclous
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oraclous -d oraclous"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [substrate]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [substrate]

  jaeger:
    image: jaegertracing/all-in-one:1.58
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [substrate]

  # R3.5 service #5 — capability-registry: Alembic schema one-shot (capability_descriptors).
  capreg-migrate:
    build:
      context: ..
      dockerfile: services/capability-registry-service/Dockerfile
    image: oraclous-capability-registry-service:${IMAGE_TAG:-dev}
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R3.5 service #5 — capability-registry: unified capability/tool registry + execution.
  capability-registry-service:
    build:
      context: ..
      dockerfile: services/capability-registry-service/Dockerfile
    image: oraclous-capability-registry-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
      AUTH_SERVICE_URL: "http://auth-service:8000"
      # Identity seam: dev-auth (Bearer dev-token → dev org) by default; AUTH_MODE=jwt consumes the
      # real auth-service token via the shared JWT_SECRET. AUTH_MODE=gateway (ADR-018) trusts the
      # gateway's X-Principal-*/X-Organisation-Id gated on the shared X-Internal-Key (no token validation).
      AUTH_MODE: "${CAPABILITY_REGISTRY_AUTH_MODE:-dev}"
      DEV_BEARER: "dev-token"
      JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      # Platform org that owns the built-in connector catalogue; read-unioned into every org's view.
      PLATFORM_ORG_ID: "${CAPABILITY_REGISTRY_PLATFORM_ORG_ID:-00000000-0000-0000-0000-0000000000a0}"
      # Tool execution resolves credentials via the credential-broker seam. Fail-CLOSED default is
      # "real" (ADR-021 §1): the default `services` profile talks to the running credential-broker
      # over /internal/*, never the fake by accident. The key-free "fake" (deterministic) is opt-in
      # for dev/CI/smoke — set CAPABILITY_REGISTRY_BROKER_MODE=fake (the dev/CI/smoke profile + the CI
      # workflow do); selecting it fires a loud one-time startup alert (fake_runtime_active).
      CREDENTIAL_BROKER_URL: "http://credential-broker-service:8000"
      CREDENTIAL_BROKER_MODE: "${CAPABILITY_REGISTRY_BROKER_MODE:-real}"
      # First-party knowledge-retriever tool (core/knowledge-retriever@1.0.0): the executor POSTs to
      # the retriever's /v1/search/* over the internal/gateway-trust path (no broker credential), the
      # caller's org identity forwarded as X-Principal-*/X-Organisation-Id gated by X-Internal-Key.
      KNOWLEDGE_RETRIEVER_URL: "http://knowledge-retriever-service:8000"
      # First-party graph-ingest tool (core/graph-ingest@1.0.0): the WRITE twin — the executor POSTs
      # to the knowledge-graph-service's /internal/v1/ingest over the same internal/gateway-trust
      # path (no broker credential), the caller's org identity forwarded the same way.
      KNOWLEDGE_GRAPH_URL: "http://knowledge-graph-service:8000"
    depends_on:
      postgres:
        condition: service_healthy
      capreg-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5-P1-S1 — schema migration one-shot (runs `alembic upgrade head`, then exits).
  kgs-migrate:
    build:
      context: ..
      dockerfile: services/knowledge-graph-service/Dockerfile
    image: oraclous-knowledge-graph-service:${IMAGE_TAG:-dev}
    environment:
      KGS_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R3.5-P1-S1 — idempotent dev-org seed one-shot (runs after migrate, then exits).
  kgs-seed:
    image: oraclous-knowledge-graph-service:${IMAGE_TAG:-dev}
    environment:
      KGS_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["python", "scripts/seed_dev.py"]
    depends_on:
      kgs-migrate:
        condition: service_completed_successfully
    restart: "no"
    profiles: [services]
    networks: [substrate]

  knowledge-graph-service:
    build:
      context: ..
      dockerfile: services/knowledge-graph-service/Dockerfile
    image: oraclous-knowledge-graph-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      <<: *kgs-env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      kgs-migrate:
        condition: service_completed_successfully
      kgs-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5-P1-S2 — Celery worker: runs the async ingest pipeline (extract -> chunk -> embed -> write).
  knowledge-graph-worker:
    image: oraclous-knowledge-graph-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    command:
      - celery
      - -A
      - oraclous_knowledge_graph_service.tasks.celery_app:celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
    environment:
      <<: *kgs-env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      kgs-migrate:
        condition: service_completed_successfully
    profiles: [services]
    networks: [substrate]

  # R3.5 service #2 — knowledge-retriever-service: READ side over the graph KGS writes.
  # Dev uses the default neo4j user (krs_reader is the Enterprise/prod role; Community has no RBAC).
  knowledge-retriever-service:
    build:
      context: ..
      dockerfile: services/knowledge-retriever-service/Dockerfile
    image: oraclous-knowledge-retriever-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # Auth: dev by default for the standalone smoke. Full stack runs KRS_AUTH_MODE=gateway
      # (ADR-018): trust the gateway's X-Principal-*/X-Organisation-Id, gated on the shared X-Internal-Key.
      KRS_AUTH_MODE: "${KRS_AUTH_MODE:-dev}"
      KRS_DEV_BEARER: "dev-token"
      KRS_INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
      KRS_JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      KRS_NEO4J_URI: "bolt://neo4j:7687"
      KRS_NEO4J_USER: "neo4j"
      KRS_NEO4J_PASSWORD: "password"
      KRS_EMBEDDING_DIM: "512"
      # Redis query cache (#308): OFF by default for the standalone smoke; the full stack flips
      # KRS_QUERY_CACHE=true in deploy/.env. KRS_REDIS_URL points at db/0 — the SAME Redis DB the
      # KGS writes the per-graph generation counter (graphgen:) to, so ingest invalidation is wired.
      KRS_REDIS_URL: "redis://redis:6379/0"
      KRS_QUERY_CACHE: "${KRS_QUERY_CACHE:-false}"
      KRS_QUERY_CACHE_TTL: "${KRS_QUERY_CACHE_TTL:-300}"
      # RAGAS-style evaluation judge (#331/#333): reuses the OpenRouter key (same provider as the
      # KGS extractor at line 50). Absent a key the evaluate endpoint fail-closes with a typed 422
      # EVAL_JUDGE_NOT_CONFIGURED (never fabricates scores); base_url/model default to OpenRouter +
      # openai/gpt-4o-mini in code. Override KRS_OPENAI_API_KEY to use a distinct judge credential.
      KRS_OPENAI_API_KEY: "${KRS_OPENAI_API_KEY:-${OPENROUTER_API_KEY:-}}"
      # Federation (#330 / ADR-026): KRS enumerates the caller's accessible set from the KGS
      # internal plane (GET /internal/v1/graphs, X-Internal-Key). Unset ⇒ federated routes 503.
      KRS_KNOWLEDGE_GRAPH_URL: "http://knowledge-graph-service:8000"
      KRS_FEDERATED_MAX_GRAPHS: "${KRS_FEDERATED_MAX_GRAPHS:-20}"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5 service #3 — identity/auth service: Alembic schema one-shot (agents + users + refresh).
  auth-migrate:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    image: oraclous-auth-service:${IMAGE_TAG:-dev}
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R3.5 service #3 Slice 1 — identity/auth service: users (email/password), JWT issuance, agents.
  # Issues the HS256 tokens KGS/KRS verify in jwt-mode (shared AUTH_JWT_SECRET).
  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    image: oraclous-auth-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      JWT_ALGORITHM: "HS256"
      # Shared with credential-broker for the G1 oauth-connect bridge — both default to
      # dev-internal-key, so the X-Internal-Key check matches in the dev stack. Keep them equal.
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
      # G1: where auth posts a connected provider token to be landed as a broker credential.
      CREDENTIAL_BROKER_URL: "http://credential-broker-service:8000"
      # OAuth (S5): blank client creds → /oauth/* returns 503 (boot OK); set per-provider in prod.
      # OAUTH_ENC_KEY blank → dev default 32-byte key; prod injects a real key via secret.
      OAUTH_ENC_KEY: "${OAUTH_ENC_KEY:-}"
      OAUTH_GOOGLE_CLIENT_ID: "${OAUTH_GOOGLE_CLIENT_ID:-}"
      OAUTH_GOOGLE_CLIENT_SECRET: "${OAUTH_GOOGLE_CLIENT_SECRET:-}"
      OAUTH_GITHUB_CLIENT_ID: "${OAUTH_GITHUB_CLIENT_ID:-}"
      OAUTH_GITHUB_CLIENT_SECRET: "${OAUTH_GITHUB_CLIENT_SECRET:-}"
      OAUTH_NOTION_CLIENT_ID: "${OAUTH_NOTION_CLIENT_ID:-}"
      OAUTH_NOTION_CLIENT_SECRET: "${OAUTH_NOTION_CLIENT_SECRET:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5 service #4 — credential-broker: Alembic schema one-shot (user_credentials + delegated_tokens).
  credbroker-migrate:
    build:
      context: ..
      dockerfile: services/credential-broker-service/Dockerfile
    image: oraclous-credential-broker-service:${IMAGE_TAG:-dev}
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      ENCRYPTION_KEY: "${CRED_BROKER_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R3.5 service #4 — credential-broker: encrypted per-user/org credential store + delegation.
  credential-broker-service:
    build:
      context: ..
      dockerfile: services/credential-broker-service/Dockerfile
    image: oraclous-credential-broker-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      # Dev-only AES-256-GCM key (32 bytes b64) + internal key → key-free smokes; prod injects secrets.
      ENCRYPTION_KEY: "${CRED_BROKER_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
      AUTH_SERVICE_URL: "http://auth-service:8000"
      # Identity seam: dev-auth (Bearer dev-token → dev org) by default; AUTH_MODE=jwt consumes the
      # real auth-service token via the shared JWT_SECRET. AUTH_MODE=gateway (ADR-018) trusts the
      # gateway's X-Organisation-Id on the user-facing edge, gated on the shared X-Internal-Key.
      AUTH_MODE: "${CRED_BROKER_AUTH_MODE:-dev}"
      DEV_BEARER: "dev-token"
      JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
    depends_on:
      postgres:
        condition: service_healthy
      credbroker-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R3.5 service #6 — application-gateway: the single reverse-proxy edge fronting the services.
  # /health is dependency-free; it routes path-prefixes to the upstreams over the substrate network.
  # R6: owns Redis (edge rate limit) + a Postgres (integration-key store, ADR-019). Until it fronts
  # everything, the services also stay reachable directly by port.
  application-gateway-service:
    build:
      context: ..
      dockerfile: services/application-gateway-service/Dockerfile
    image: oraclous-application-gateway-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8006:8000"
    environment:
      # upstream base URLs (the route table maps path-prefixes onto these over the substrate net)
      AUTH_SERVICE_URL: "http://auth-service:8000"
      CREDENTIAL_BROKER_URL: "http://credential-broker-service:8000"
      KNOWLEDGE_GRAPH_URL: "http://knowledge-graph-service:8000"
      KNOWLEDGE_RETRIEVER_URL: "http://knowledge-retriever-service:8000"
      CAPABILITY_REGISTRY_URL: "http://capability-registry-service:8000"
      HARNESS_RUNTIME_URL: "http://harness-runtime-service:8000"
      EXECUTION_ENGINE_URL: "http://execution-engine-service:8000"
      # identity seam: dev-auth by default; AUTH_MODE=jwt verifies the real token via the shared secret
      GATEWAY_AUTH_MODE: "${GATEWAY_AUTH_MODE:-dev}"
      DEV_BEARER: "dev-token"
      JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      # edge-auth (ADR-018): injected as X-Internal-Key on every forwarded request so upstreams in
      # gateway-mode can prove the request came through the gateway. Shared with the data services.
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
      GATEWAY_CORS_ORIGINS: "${GATEWAY_CORS_ORIGINS:-*}"
      # edge protection (R6 Slice 2): Redis-backed rate limit (DB 2) + request-size guard. The limiter
      # fails OPEN if Redis is down; these knobs are ops-tunable.
      REDIS_URL: "redis://redis:6379/2"
      EDGE_RATE_LIMIT: "${EDGE_RATE_LIMIT:-600}"
      EDGE_RATE_WINDOW_SECONDS: "${EDGE_RATE_WINDOW_SECONDS:-60}"
      MAX_REQUEST_BODY_BYTES: "${MAX_REQUEST_BODY_BYTES:-10485760}"
      TRUSTED_PROXY_COUNT: "${TRUSTED_PROXY_COUNT:-0}"
      # gateway-owned datastore (R6 Slice 3, ADR-019): the integration-key store
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    depends_on:
      redis:
        condition: service_healthy
      gateway-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R6-S3 — gateway integration-key schema migration one-shot (alembic upgrade head, then exits).
  gateway-migrate:
    build:
      context: ..
      dockerfile: services/application-gateway-service/Dockerfile
    image: oraclous-application-gateway-service:${IMAGE_TAG:-dev}
    environment:
      DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R4-S1 — harness-runtime schema migration one-shot (runs `alembic upgrade head`, then exits).
  harness-migrate:
    build:
      context: ..
      dockerfile: services/harness-runtime-service/Dockerfile
    image: oraclous-harness-runtime-service:${IMAGE_TAG:-dev}
    environment:
      HARNESS_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R4 — harness-runtime-service: loads an OHM and runs the agent tool-use loop over registry tools.
  harness-runtime-service:
    build:
      context: ..
      dockerfile: services/harness-runtime-service/Dockerfile
    image: oraclous-harness-runtime-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      HARNESS_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      # Identity seam: dev-auth by default; AUTH_MODE=gateway (ADR-018) trusts the gateway's
      # X-Principal-*/X-Organisation-Id gated on the shared X-Internal-Key. The runtime forwards the
      # same identity to the registry on every dispatch.
      HARNESS_AUTH_MODE: "${HARNESS_AUTH_MODE:-dev}"
      HARNESS_DEV_BEARER: "dev-token"
      HARNESS_JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      HARNESS_INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
      HARNESS_CAPABILITY_REGISTRY_URL: "http://capability-registry-service:8000"
      HARNESS_CREDENTIAL_BROKER_URL: "http://credential-broker-service:8000"
      HARNESS_KNOWLEDGE_RETRIEVER_URL: "http://knowledge-retriever-service:8000"
      HARNESS_KNOWLEDGE_GRAPH_URL: "http://knowledge-graph-service:8000"
      # Post-run agent-memory hook (#332 / ADR-027 §5): default OFF in code; the deploy env opts in
      # (HARNESS_MEMORY_WRITES=true in deploy/.env). Fire-and-forget + fail-soft — a memory write
      # can never fail, block, or slow a run.
      HARNESS_MEMORY_WRITES: "${HARNESS_MEMORY_WRITES:-false}"
      # The LLM seam. Fail-CLOSED default is `live` (ADR-021 §1): the default `services` profile
      # builds the real client from the OHM model's protocol_shape + a BYOM key resolved via the
      # broker (ADR-008, no platform key) — never the scripted fake by accident. The key-free `fake`
      # is opt-in for dev/CI/smoke — set HARNESS_LLM_MODE=fake (the dev/CI/smoke profile + the CI
      # workflow + the harness/engine smokes do); selecting it fires a loud startup alert.
      HARNESS_LLM_MODE: "${HARNESS_LLM_MODE:-live}"
      # Operator's provider→base-URL map (JSON; e.g. openrouter/openai). A custom BYOM connection may
      # instead carry its own `base_url` to reach ANY OpenAI-compatible endpoint.
      HARNESS_LLM_BASE_URLS: "${HARNESS_LLM_BASE_URLS:-}"
      # SSRF egress guard for connection-supplied base URLs. True (single-tenant default) lets a
      # user's local LLM work (host.docker.internal / 127.0.0.1 / 192.168.x); link-local/cloud-
      # metadata stays blocked regardless. A MULTI-TENANT deployment MUST set this false.
      HARNESS_ALLOW_PRIVATE_LLM_TARGETS: "${HARNESS_ALLOW_PRIVATE_LLM_TARGETS:-true}"
      # OHM signature trust store (signer-id → public-key PEM, JSON). Empty by default; set to verify
      # signed OHMs. Unsigned OHMs load regardless unless a policy/flag requires a signature.
      HARNESS_OHM_TRUST_KEYS: "${HARNESS_OHM_TRUST_KEYS:-}"
      # Deployment governance floor: force a policy set for every run (author can't downgrade).
      HARNESS_FORCE_POLICY_SET: "${HARNESS_FORCE_POLICY_SET:-}"
    depends_on:
      postgres:
        condition: service_healthy
      harness-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R5-S1 — execution-engine schema migration one-shot (runs `alembic upgrade head`, then exits).
  engine-migrate:
    build:
      context: ..
      dockerfile: services/execution-engine-service/Dockerfile
    image: oraclous-execution-engine-service:${IMAGE_TAG:-dev}
    environment:
      ENGINE_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: [services]
    networks: [substrate]

  # R5 — execution-engine-service: durable harness jobs, schedules, task board, round-table.
  execution-engine-service:
    build:
      context: ..
      dockerfile: services/execution-engine-service/Dockerfile
    image: oraclous-execution-engine-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      ENGINE_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      ENGINE_REDIS_URL: "redis://redis:6379/1"
      # Identity seam: dev-auth by default; AUTH_MODE=gateway (ADR-018) trusts the gateway's
      # X-Principal-*/X-Organisation-Id gated on the shared X-Internal-Key, and forwards the same
      # identity to the harness on every run.
      ENGINE_AUTH_MODE: "${ENGINE_AUTH_MODE:-dev}"
      ENGINE_DEV_BEARER: "dev-token"
      ENGINE_JWT_SECRET: "${AUTH_JWT_SECRET:-dev-jwt-secret}"
      ENGINE_INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
      ENGINE_HARNESS_RUNTIME_URL: "http://harness-runtime-service:8000"
    depends_on:
      postgres:
        condition: service_healthy
      engine-migrate:
        condition: service_completed_successfully
      harness-runtime-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [services]
    networks: [substrate]

  # R5-S2 — execution-engine Celery worker: runs durable harness jobs out-of-request.
  execution-engine-worker:
    image: oraclous-execution-engine-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    command: ["celery", "-A", "oraclous_execution_engine_service.tasks.celery_app:celery_app",
              "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      ENGINE_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      ENGINE_REDIS_URL: "redis://redis:6379/1"
      # The worker forwards identity to the harness reconstructed from the durable job; in gateway
      # mode it sends X-Principal-*/X-Internal-Key (so the harness sees the submitting tenant).
      ENGINE_AUTH_MODE: "${ENGINE_AUTH_MODE:-dev}"
      ENGINE_DEV_BEARER: "dev-token"
      ENGINE_INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-dev-internal-key}"
      ENGINE_HARNESS_RUNTIME_URL: "http://harness-runtime-service:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine-migrate:
        condition: service_completed_successfully
    profiles: [services]
    networks: [substrate]

  # R5-S5 — Celery Beat: the SINGLE process that fires due cron schedules + sweeps stranded jobs.
  # Exactly one beat must run; firing is idempotent (the engine_jobs (org, idempotency_key) unique
  # constraint), so a missed tick = a missed fire, never a duplicate.
  execution-engine-beat:
    image: oraclous-execution-engine-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    command: ["celery", "-A", "oraclous_execution_engine_service.tasks.celery_app:celery_app",
              "beat", "--loglevel=info"]
    environment:
      ENGINE_DATABASE_URL: "postgresql+asyncpg://oraclous:oraclous@postgres:5432/oraclous"
      ENGINE_REDIS_URL: "redis://redis:6379/1"
    depends_on:
      redis:
        condition: service_healthy
      engine-migrate:
        condition: service_completed_successfully
    profiles: [services]
    networks: [substrate]

networks:
  substrate:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  pgdata:
