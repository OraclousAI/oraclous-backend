# docker-compose.dev-ports.yml — re-publish the upstream services' host ports for LOCAL DEBUGGING
# and the per-service smokes that probe a service directly.
#
# The base docker-compose.yml keeps the seven upstream application services INTERNAL-ONLY (sole-
# ingress, R6 Slice 9): the application-gateway (8006) is the only application surface published to
# the host by default; every other service is reachable only on the internal `oraclous` network.
# Infra (Postgres/Redis/Neo4j/Jaeger) stays published in the base file for dev tooling.
#
# Apply this override explicitly to reach an upstream directly (it does NOT auto-load when you pass
# -f docker-compose.yml):
#
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev-ports.yml up -d
#
# The gateway/harness/engine smokes go through the gateway and do NOT need this; the capability-
# registry / knowledge-graph / knowledge-retriever / auth / credential-broker smokes probe their
# service directly and apply this override.
services:
  capability-registry-service:
    ports:
      - "8001:8000"
  credential-broker-service:
    ports:
      - "8002:8000"
  knowledge-graph-service:
    ports:
      - "8003:8000"
  knowledge-retriever-service:
    ports:
      - "8004:8000"
  auth-service:
    ports:
      - "8005:8000"
  harness-runtime-service:
    ports:
      - "8007:8000"
  execution-engine-service:
    ports:
      - "8008:8000"
