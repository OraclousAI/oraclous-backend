[pytest]
addopts = --strict-markers
asyncio_mode = auto
markers =
    unit: fast, isolated tests with no external dependencies
    integration: tests requiring real substrate instances (Neo4j/Postgres/Redis)
    security: security-relevant tests mapped to the Structured Threat Catalogue
    isolation: cross-tenant isolation tests
    byom: bring-your-own-model credential-path tests
    organization_isolation: substrate-level per-organisation isolation tests (ADR-006)
