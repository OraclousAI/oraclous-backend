        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "202": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
