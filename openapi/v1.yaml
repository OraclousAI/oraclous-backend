openapi: 3.1.0
info:
  title: Oraclous Platform API
  version: 1.0.0
  description: >-
    The public REST contract served by the application-gateway-service — the platform's single
    external edge (ADR-015, ADR-018). Every request is authenticated once at the edge (a bearer JWT
    issued by the identity service); the gateway forwards a verified identity downstream and streams the
    upstream response back. Every 4xx/5xx the caller sees is the canonical **ORA-37 error envelope**
    (`components/schemas/ErrorEnvelope`) — gateway-own errors and normalised upstream errors alike;
    an upstream body is never relayed, so no stack/SQL/internal-host detail can leak (Interface
    Contracts §3).


    **Stability (ADR-015 §2):** each operation carries `x-stability: stable | provisional`. A `stable`
    operation's shape is locked; breaking changes require a new major version. The `openapi-diff-gate`
    CI job blocks breaking changes to `stable` operations.


    **Evolving contract (R6):** this is the R6-in-progress public surface and grows per release slice
    (integration keys + published agents, chat, webhooks, MCP land in later R6 slices and are added
    here as they ship). The published `openapi/v1.yaml` — not any planning table — is the source of
    truth for what the gateway actually exposes.


    **As-built path note:** the proxied paths are currently heterogeneous (`/v1/...`, `/api/v1/...`,
    `/credentials`, `/oauth`) — a consequence of the R3.5 per-service surfaces. Normalising every path
    to a uniform `/v1/` (ADR-015 §1) is a tracked R6 follow-up; this document records the paths that
    actually route today.


    **Response bodies:** success (2xx) bodies are produced and owned by the upstream service and
    streamed through unchanged; this contract documents the operation, its auth, and its error
    envelope, and references the owning service for the success shape (per-operation success schemas
    are a planned enrichment). Error (4xx/5xx) bodies are always the ErrorEnvelope.


    **Edge protection (applies to every operation):** the gateway enforces a per-client rate limit
    and a request-body-size cap at the edge. Any operation may therefore return **429 RATE_LIMITED**
    (with a `Retry-After` header) or **413 PAYLOAD_TOO_LARGE** — both as the ErrorEnvelope. Liveness
    and this contract's own probes (`/health*`, `/v1/openapi.*`, `/docs`) are exempt from the limit.
servers:
  - url: /
    description: The application-gateway edge (e.g. http://localhost:8006 self-hosted).
security:
  - bearerAuth: []
tags:
  - name: gateway
    description: The gateway's own endpoints (health). No authentication.
  - name: auth
    description: Identity, organisations, invitations, and OAuth login.
  - name: credentials
    description: Credential storage and runtime token resolution.
  - name: knowledge-graph
    description: Graph CRUD and recipe-driven ingestion.
  - name: knowledge-retriever
    description: Semantic / full-text / hybrid / graph / temporal retrieval.
  - name: capabilities
    description: The capability registry, tools, instances, and synchronous tool execution.
  - name: harness
    description: Synchronous OHM execution, human assignment, and mid-loop HITL resume.
  - name: engine
    description: Durable jobs, the human task board, schedules, and round-tables.
  - name: agents
    description: Publish agents (member) + the public published-agent surface (integration key).
  - name: keys
    description: Integration-key management (member) — mint, list, rotate, revoke.
  - name: chat
    description: Member console chat — persisted multi-turn conversations with a published agent.
  - name: webhooks
    description: >
      Inbound signed webhooks (public, HMAC-gated) that fire a published agent on the engine, plus the
      member-only subscription management that mints them.
  - name: mcp
    description: >
      A Model Context Protocol server (JSON-RPC) exposing the org's published agents as tools to
      external MCP clients, authenticated by an integration key.
paths:
  /health:
    get:
      tags: [gateway]
      summary: Gateway liveness.
      operationId: gatewayHealth
      security: []
      x-stability: stable
      responses:
        "200":
          description: The gateway is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: application-gateway }
  /health/upstreams:
    get:
      tags: [gateway]
      summary: Aggregated upstream health (per-service + an overall rollup).
      operationId: gatewayUpstreamsHealth
      security: []
      x-stability: stable
      responses:
        "200":
          description: Per-upstream status plus an overall rollup (ok iff every upstream is ok).
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall: { type: string, enum: [ok, degraded] }
                  upstreams:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        status: { type: string, enum: [ok, degraded] }

  /v1/auth/register:
    post:
      tags: [auth]
      summary: Register a user (mints a personal organisation + an access/refresh token pair).
      operationId: authRegister
      security: []
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/UpstreamJson" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "5XX": { $ref: "#/components/responses/Upstream5xx" }
  /v1/auth/login:
    post:
      tags: [auth]
      summary: Authenticate a user; returns an access/refresh token pair.
      operationId: authLogin
      security: []
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "5XX": { $ref: "#/components/responses/Upstream5xx" }
  /v1/auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new access token.
      operationId: authRefresh
      security: []
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "5XX": { $ref: "#/components/responses/Upstream5xx" }
  /v1/auth/me:
    get:
      tags: [auth]
      summary: The authenticated user + active organisation.
      operationId: authMe
      x-stability: stable
      responses:
        "200":
          description: The authenticated user + active organisation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
  /v1/auth/switch-org:
    post:
      tags: [auth]
      summary: Switch the active organisation; re-mints the access token with the new org claim.
      operationId: authSwitchOrg
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Unauthorized" }
  /oauth/providers:
    get:
      tags: [auth]
      summary: The configured social-login providers (Google / GitHub / Notion).
      operationId: oauthProviders
      security: []
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }

  /credentials/providers:
    get:
      tags: [credentials]
      summary: The credential providers available to the caller's organisation.
      operationId: credentialProviders
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /api/v1/graphs:
    get:
      tags: [knowledge-graph]
      summary: List the organisation's knowledge graphs.
      operationId: listGraphs
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
  /api/v1/graphs/{graphId}/resolution/{candidateId}/approve:
    post:
      tags: [knowledge-graph]
      summary: Approve a SAME_AS_CANDIDATE pair — merge the two entities into the canonical node.
      description: >-
        HITL entity-resolution (#279). Folds `other_node_id` onto `canonical_node_id` (survivor):
        re-points its relationships, unions its aliases, deletes the candidate edge. `candidateId`
        is the sha256 of the sorted endpoint node-id pair (order-independent). Idempotent; a
        conflicting prior verdict by another reviewer returns 409.
      operationId: approveResolutionCandidate
      x-stability: stable
      parameters:
        - { name: graphId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: candidateId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveCandidateRequest" }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/graphs/{graphId}/resolution/{candidateId}/reject:
    post:
      tags: [knowledge-graph]
      summary: Reject a SAME_AS_CANDIDATE pair — record a not-duplicate judgement, drop the edge.
      description: >-
        HITL entity-resolution (#279). Records a NOT_SAME_AS suppression so the pair is not
        re-flagged on re-ingestion, and drops the candidate edge. `candidateId` is the sha256 of
        the sorted endpoint node-id pair.
      operationId: rejectResolutionCandidate
      x-stability: stable
      parameters:
        - { name: graphId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: candidateId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveCandidateRequest" }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/recipes:
    get:
      tags: [knowledge-graph]
      summary: List ingestion recipes.
      operationId: listRecipes
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /v1/search:
    post:
      tags: [knowledge-retriever]
      summary: Semantic / full-text / hybrid retrieval; returns a uniform NodeResult envelope.
      operationId: search
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /v1/graph/{graphId}/temporal:
    get:
      tags: [knowledge-retriever]
      summary: Point-in-time entities whose validity window covers `as_of`.
      operationId: temporalRead
      x-stability: stable
      parameters:
        - { name: graphId, in: path, required: true, schema: { type: string } }
        - { name: as_of, in: query, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /api/v1/tools:
    get:
      tags: [capabilities]
      summary: The capability catalogue (tools) visible to the caller's organisation.
      operationId: listTools
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      tags: [capabilities]
      summary: Register a tool descriptor (idempotent — the id is derived from the descriptor identity).
      operationId: registerTool
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "201":
          description: The registered tool descriptor.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DescriptorResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/tools/{toolId}:
    get:
      tags: [capabilities]
      summary: Read one tool descriptor (org-scoped; an unknown / cross-org id is a 404 — mask).
      operationId: getTool
      x-stability: stable
      parameters:
        - { name: toolId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The tool descriptor.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DescriptorResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/tools/import-mcp:
    post:
      tags: [capabilities]
      summary: >-
        Import an external MCP server's tools (ADMIN) — each is registered `pending_approval` and is
        not executable until approved. The server URL is SSRF-egress-checked.
      operationId: importMcpTools
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "201":
          description: The imported `pending_approval` descriptors.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JsonObject" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "5XX": { $ref: "#/components/responses/Upstream5xx" }
  /api/v1/tools/{toolId}/approve:
    post:
      tags: [capabilities]
      summary: Approve an imported MCP tool (ADMIN) — pending_approval → active, making it executable.
      operationId: approveTool
      x-stability: stable
      parameters:
        - { name: toolId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Approved — the tool is now active. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/capabilities:
    get:
      tags: [capabilities]
      summary: The unified capability registry.
      operationId: listCapabilities
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
  /api/v1/capabilities/match:
    post:
      tags: [capabilities]
      summary: Match capabilities by name — returns the registry entries whose names match.
      operationId: matchCapabilities
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/capabilities/{capabilityId}:
    get:
      tags: [capabilities]
      summary: Read one capability descriptor (org-scoped; an unknown / cross-org id is a 404 — mask).
      operationId: getCapability
      x-stability: stable
      parameters:
        - { name: capabilityId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The capability descriptor.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DescriptorResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [capabilities]
      summary: Replace a capability's descriptor (org-scoped).
      operationId: updateCapability
      x-stability: stable
      parameters:
        - { name: capabilityId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "200":
          description: The updated capability descriptor.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DescriptorResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      tags: [capabilities]
      summary: Delete a capability descriptor (org-scoped).
      operationId: deleteCapability
      x-stability: stable
      parameters:
        - { name: capabilityId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/instances:
    get:
      tags: [capabilities]
      summary: List the organisation's tool instances (a configured, credential-bound capability).
      operationId: listInstances
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      tags: [capabilities]
      summary: Create a tool instance from a capability (org + owning user from the principal).
      operationId: createInstance
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/instances/{instanceId}:
    get:
      tags: [capabilities]
      summary: Read one tool instance (org-scoped; an unknown / cross-org id is a 404 — mask).
      operationId: getInstance
      x-stability: stable
      parameters:
        - { name: instanceId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/instances/{instanceId}/configure-credentials:
    post:
      tags: [capabilities]
      summary: Bind credential ids to the instance's required credential types (org-scoped).
      operationId: configureInstanceCredentials
      x-stability: stable
      parameters:
        - { name: instanceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/instances/{instanceId}/validate-execution:
    get:
      tags: [capabilities]
      summary: The instance's execution-readiness report (checks + any blocking action items).
      operationId: validateInstanceExecution
      x-stability: stable
      parameters:
        - { name: instanceId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/instances/{instanceId}/health:
    get:
      tags: [capabilities]
      summary: The instance's health view — an alias of validate-execution (the readiness report).
      operationId: instanceHealth
      x-stability: stable
      parameters:
        - { name: instanceId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/instances/{instanceId}/execute:
    post:
      tags: [capabilities]
      summary: Execute a configured instance synchronously (sync only; durable/async is the engine).
      operationId: executeInstance
      x-stability: stable
      parameters:
        - { name: instanceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/executions/{executionId}:
    get:
      tags: [capabilities]
      summary: Read an execution row (status + result + provenance), org-scoped.
      operationId: getExecution
      x-stability: stable
      parameters:
        - { name: executionId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/executions:
    post:
      tags: [capabilities]
      summary: Execute a tool synchronously (sync only; durable/async is the engine).
      operationId: executeTool
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/harnesses/execute:
    post:
      tags: [harness]
      summary: Run an OHM to completion or escalation, synchronously; returns the execution row.
      operationId: harnessExecute
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "5XX": { $ref: "#/components/responses/Upstream5xx" }
  /v1/harnesses/executions:
    get:
      tags: [harness]
      summary: List the organisation's harness executions.
      operationId: listExecutions
      x-stability: stable
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
  /v1/harnesses/spend:
    get:
      tags: [harness]
      summary: An ESTIMATE of the org's BYOM provider LLM spend — NOT a platform charge.
      description: >-
        An **estimate** of the caller organisation's own provider (BYOM) LLM spend, priced at read
        time from a static rate table — this is **not** platform billing or a charge Oraclous levies
        (ADR-009: the substrate meters raw tokens; pricing is a downstream read-time concern). Raw
        per-model token sums are priced when the table knows the model; a model **absent** from the
        table reports its tokens only (`estimated_usd: null`, `priced: false`) and is listed in
        `unpriced_models`. `total_estimated_usd` sums only the priced rows. Org-scoped.
      operationId: harnessSpend
      x-stability: provisional
      parameters:
        - name: since
          in: query
          required: false
          description: ISO8601 timestamp; bounds the spend window to executions at or after it. Omit for all-time.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: The org's estimated BYOM spend, per model and in total.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SpendResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /v1/harnesses/{executionId}/resume:
    post:
      tags: [harness]
      summary: Resolve a mid-loop HITL pause — APPROVED resumes the loop, DENIED fails it.
      operationId: harnessResume
