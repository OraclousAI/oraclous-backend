  # --- Inbound webhook ingress (R6 Slice 7) — PUBLIC, signature-gated (no bearer) ---
  /v1/webhooks/{subscriptionId}:
    post:
      tags: [webhooks]
      summary: Inbound signed webhook — verify the HMAC, fire the bound agent on the engine.
      description: >
        PUBLIC (no bearer). Authenticated by an HMAC-SHA256 signature over the raw body in
        `X-Hub-Signature-256: sha256=<hex>`, keyed by the subscription's signing secret. An optional
        `X-Webhook-Delivery` header dedupes redeliveries (else the body hash). The whole auth-failure
        family (unknown/disabled subscription, bad/absent signature, unpublished target) returns a
        uniform 404 (anti-enumeration); a verified event is dispatched and returns 202.
      operationId: receiveWebhook
      x-stability: provisional
      security: []
      parameters:
        - { name: subscriptionId, in: path, required: true, schema: { type: string } }
        - { name: X-Hub-Signature-256, in: header, required: true, schema: { type: string } }
        - { name: X-Webhook-Delivery, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "202": { description: Accepted — a verified event was dispatched. }
        "404": { $ref: "#/components/responses/NotFound" }
        "5XX": { $ref: "#/components/responses/Upstream5xx" }

  # --- Webhook subscription management (R6 Slice 7) — member, org-scoped ---
  /v1/webhook-subscriptions:
    post:
      tags: [webhooks]
      summary: Register a webhook for a published agent (member) — the signing secret is shown ONCE.
      operationId: createWebhookSubscription
      x-stability: provisional
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWebhookSubscription" }
      responses:
        "201": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    get:
      tags: [webhooks]
      summary: List the member's own webhook subscriptions.
      operationId: listWebhookSubscriptions
      x-stability: provisional
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Unauthorized" }
  /v1/webhook-subscriptions/{subscriptionId}:
    delete:
      tags: [webhooks]
      summary: Delete a webhook subscription (member, the creator's org only).
      operationId: deleteWebhookSubscription
      x-stability: provisional
      parameters:
        - { name: subscriptionId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- MCP server (R6 Slice 8) — published agents as MCP tools, integration-key auth ---
  /v1/mcp:
    post:
      tags: [mcp]
      summary: MCP JSON-RPC endpoint — initialize / tools/list / tools/call (an integration key only).
      description: >
        A Model Context Protocol server over JSON-RPC 2.0 (Streamable HTTP). An external MCP client
        (Claude Desktop / Cursor) authenticates with its `oak-`/`oag-` integration key as a Bearer
        token (a member JWT is 403). `tools/list` returns the org's published agents (scoped by the
        key's binding) as MCP tools; `tools/call` runs the agent through the invoke path and returns
        an MCP result (the harness internals never leak). A JSON-RPC notification (no `id`) returns
        202. Methods beyond initialize/tools/list/tools/call return `-32601`.
      operationId: mcpEndpoint
      x-stability: provisional
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/UpstreamJson" }
        "202": { description: Accepted — a JSON-RPC notification (no response body). }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        A short-lived access token minted by the identity service (member credentials). The gateway verifies
        it once at the edge and forwards a verified identity downstream (ADR-018). Integration-key and
        agent-credential auth modes are added in later R6 slices.
  schemas:
    JsonObject:
      type: object
      description: A free-form JSON object; the precise request shape is owned by the upstream service.
      additionalProperties: true
    ResolveCandidateRequest:
      type: object
      description: >-
        The SAME_AS_CANDIDATE pair to action (#279). Both ids are the nodes' deterministic `id`
        property as surfaced by the subgraph endpoint. On approve, `canonical_node_id` is the
        survivor (the other node is folded in); on reject the order is immaterial. The path
        `candidateId` must be the sha256 of the sorted pair, so the URL and the operands agree.
      required: [canonical_node_id, other_node_id]
      additionalProperties: false
      properties:
        canonical_node_id: { type: string, minLength: 1, maxLength: 128 }
        other_node_id: { type: string, minLength: 1, maxLength: 128 }
    DescriptorResponse:
      type: object
      description: >-
        A capability/tool descriptor as returned by the registry. The full body is owned by the
        capability-registry-service; only the load-bearing fields are named here. `status`
        distinguishes an executable descriptor from one awaiting the MCP-import supply-chain gate.
      additionalProperties: true
      properties:
        id: { type: string, format: uuid }
        organisation_id: { type: string, format: uuid }
        kind: { type: string, description: The descriptor kind (e.g. tool). }
        name: { type: [string, "null"] }
        descriptor:
          type: object
          additionalProperties: true
          description: The OHM manifest JSONB.
        status:
          type: string
          enum: [active, pending_approval]
          default: active
          description: >-
            `active` is executable; `pending_approval` is an imported MCP tool awaiting an admin's
            approval (it is not executable until approved).
    MeResponse:
      type: object
      description: The signed-in principal + active organisation, with the member's role (R7-SEC S2).
      additionalProperties: true
      properties:
        id: { type: string, format: uuid }
        principal_type: { type: string, enum: [user] }
        organisation_id: { type: string, format: uuid }
        email: { type: string, nullable: true }
        org_role:
          type: string
          enum: [owner, admin, member]
          nullable: true
          description: The member's role in organisation_id; null on pre-S2 tokens.
      required: [id, principal_type, organisation_id]
    ModelSpendOut:
      type: object
      additionalProperties: false
      description: >-
        Per-model spend estimate. `estimated_usd` is null and `priced` is false for a model absent
        from the static rate table — it reports its raw tokens only, never a fabricated price.
      required: [model, input_tokens, output_tokens, executions, estimated_usd, priced]
      properties:
        model:
          type: [string, "null"]
          description: The provider model id these tokens were billed against (null when unattributed).
        input_tokens: { type: integer, description: Summed prompt tokens for this model over the window. }
        output_tokens: { type: integer, description: Summed completion tokens for this model over the window. }
        executions: { type: integer, description: Number of harness executions that used this model. }
        estimated_usd:
          type: [number, "null"]
          description: Estimated cost of this model's tokens; null when the model is not in the rate table.
        priced:
          type: boolean
          description: True when the rate table priced this model; false when only raw tokens are reported.
    SpendResponse:
      type: object
      additionalProperties: false
      description: >-
        An ESTIMATE of the org's provider (BYOM) LLM spend, priced from a static rate table — NOT
        platform billing. Org-scoped. Unpriced models (absent from the table) contribute raw tokens
        only and are named in `unpriced_models`; `total_estimated_usd` sums only the priced rows.
        Mirrors harness-runtime-service `SpendResponse`/`ModelSpendOut`.
      required:
        - since
        - currency
        - by_model
        - total_estimated_usd
        - total_input_tokens
        - total_output_tokens
        - unpriced_models
      properties:
        since:
          type: [string, "null"]
          format: date-time
          description: The window lower bound echoed from the `since` query param; null for all-time.
        currency:
          type: string
          default: USD
          description: The currency the estimate is denominated in (always USD today).
        by_model:
          type: array
          description: One row per model that recorded tokens over the window.
          items: { $ref: "#/components/schemas/ModelSpendOut" }
        total_estimated_usd:
          type: number
          description: Sum of `estimated_usd` over the PRICED rows only (unpriced models contribute zero).
        total_input_tokens: { type: integer, description: Summed prompt tokens across all models. }
        total_output_tokens: { type: integer, description: Summed completion tokens across all models. }
        unpriced_models:
          type: array
          description: Model ids that recorded tokens but were absent from the rate table (tokens-only).
          items: { type: string }
    CreateWebhookSubscription:
      type: object
      description: >-
        Register a webhook subscription for a published agent. The full shape is owned by the
        application-gateway-service; the load-bearing fields are named here.
      additionalProperties: true
      required: [agent_slug]
      properties:
        agent_slug:
          type: string
          description: A published agent in the member's organisation.
        signature_scheme:
          type: string
          enum: [generic, github, stripe, slack]
          default: generic
          description: >-
            The PINNED signature scheme the external source signs with (default the generic
            HMAC-SHA256). An unknown value is a 422 here — never a silent downgrade at verify time.
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [field, issue]
      properties:
        field:
          type: string
          minLength: 1
          description: The offending field name or path. Never the value.
        issue:
          type: string
          pattern: "^[A-Z][A-Z0-9_]*$"
          description: Machine-readable issue token (e.g. INVALID_FORMAT). Describes the problem, not the value.
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      description: >-
        Canonical ORA-37 envelope for every 4xx/5xx the gateway produces (own + normalised upstream).
        `additionalProperties` is false at every level so no stack/cause/exception/trace field can ever
        exist. Mirrors packages/errors/contract/error-envelope.schema.json (the cross-repo source).
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, requestId, retryable]
          properties:
            code:
              type: string
              description: Closed machine-readable taxonomy; the only branch key. Never branch on message.
              enum:
                - VALIDATION_FAILED
                - MALFORMED_REQUEST
                - UNAUTHENTICATED
                - UNAUTHORIZED
                - NOT_FOUND
                - METHOD_NOT_ALLOWED
                - CONFLICT
                - PAYLOAD_TOO_LARGE
                - UNSUPPORTED_MEDIA_TYPE
                - RATE_LIMITED
                - INTERNAL_ERROR
                - SERVICE_UNAVAILABLE
                - GATEWAY_TIMEOUT
            message:
              type: string
              minLength: 1
              description: Curated, generic, human-readable. Never an exception message; never reflects request content.
            requestId:
              type: string
              pattern: "^req_[0-9A-Za-z]+$"
              description: Opaque correlation handle; the only trace exposed. Maps server-side to the full trace.
            retryable:
              type: boolean
              description: Server-authoritative — may a retry succeed? The FE reads this boolean; it never hardcodes which codes are retryable.
            details:
              type: array
              minItems: 1
              description: Present only for VALIDATION_FAILED. Closed sub-vocabulary; never the raw offending value.
              items: { $ref: "#/components/schemas/ErrorDetail" }
  responses:
    UpstreamJson:
      description: Success — a JSON body produced and owned by the upstream service, streamed through unchanged.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/JsonObject" }
    Unauthenticated:
      description: No or invalid credentials (UNAUTHENTICATED).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: Authenticated but not permitted (UNAUTHORIZED).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: No such resource, or an unrouted path (NOT_FOUND).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Conflict:
      description: The request conflicts with current state (CONFLICT).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ValidationFailed:
      description: The request failed validation (VALIDATION_FAILED; carries details[]).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Too many requests (RATE_LIMITED).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Upstream5xx:
      description: An upstream failure normalised to the envelope (SERVICE_UNAVAILABLE / GATEWAY_TIMEOUT / INTERNAL_ERROR).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
