[pytest]
testpaths = app/tests
asyncio_mode = auto
asyncio_default_test_loop_scope = session
asyncio_default_fixture_loop_scope = session
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    organization_isolation: marks tests that verify org_id tenant isolation
    security: security-relevant tests mapped to the Structured Threat Catalogue
    capability_integrity: capability descriptor hash/integrity tests (T4)
