name: Release

on:
  push:
    tags: ["v*"]

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push capability-registry-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/capability-registry-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/capability-registry-service:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/capability-registry-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
