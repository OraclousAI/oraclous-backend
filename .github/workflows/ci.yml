name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # `lint` is ALWAYS green by design (no test execution) and is the REQUIRED merge-gate
  # status check. It mirrors the .githooks/pre-push hook exactly. Splitting it out from the
  # tests lets the ruleset block avoidable lint/format/type churn WITHOUT freezing ADR-010's
  # two-PR TDD, where `unit`/`integration` are intentionally RED until the `[impl]` lands.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Lockfile consistency (#460 — committed uv.lock matches pyproject; not just dirty-tree)
        run: uv lock --check
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Type check (tools)
        run: uv run mypy tools
      - name: Type check (services + packages — WP-7 ratchet, A6)
        # Gates packages/* + auth-service + knowledge-retriever-service today; the six
        # not-yet-typed services are kept lenient via [[tool.mypy.overrides]] in
        # pyproject (ratchet TODO documented there). Tighten one service at a time.
        run: uv run mypy services packages
      - name: Import contracts (four-layer architecture)
        run: uv run lint-imports
      - name: Organisation-scoping guardrails
        run: uv run python -m tools.lint.check_org_scoping packages services
      - name: Fail-closed-secrets guardrail (WP-1, T6 / ADR-008)
        run: uv run python -m tools.lint.check_failclosed_secrets services
      - name: Org-scoped-labels YAML schema validator
        run: uv run python -m tools.lint.check_org_scoped_labels_schema
      - name: Test-import hygiene guardrail (TDD-window collection safety)
        run: uv run python -m tools.lint.check_test_imports packages services tests
      - name: Neo4j write-role bypass guardrail (T6)
        run: uv run python -m tools.lint.check_neo4j_write_role
      - name: Contract fixture integrity (error envelope)
        run: uv run python -m tools.contract.verify_checksums
      - name: Neo4j read-role bypass guardrail (T6)
        run: uv run python -m tools.lint.check_neo4j_read_role
      - name: Service architecture guardrail (R3.5)
        run: uv run python -m tools.lint.check_service_structure services
      - name: No-hollow guardrail (R3.5)
        run: uv run python -m tools.lint.check_no_stubs services
      - name: Release-coverage guardrail (WP-3/4 — all dockerized claimed_done services built + scanned/signed)
        run: uv run python -m tools.lint.check_release_coverage
      - name: Correlation-id propagation guardrail (WP-6, A5)
        run: uv run python -m tools.lint.check_correlation_propagation
      - name: Threat-marker coverage guardrail (WP-8, A7 — every required marker maps to >=1 test)
        run: uv run python -m tools.lint.check_threat_marker_coverage
      - name: RLS-coverage guardrail (ADR-030 §4 — every realized org-scoped table has RLS applied)
        run: uv run python -m tools.lint.check_rls_coverage
      - name: Service first-party-dependency guardrail (#375 — every imported workspace package is declared)
        run: uv run python -m tools.lint.check_service_dep_imports services
      - name: RLS request-binding guardrail (an RLS-engine service binds the org in src)
        run: uv run python -m tools.lint.check_rls_request_binding
      - name: Seam-wiring guardrail (#446 — every built control seam is wired on a request path)
        run: uv run python -m tools.lint.check_seam_wired

  # `helm-chart` validates the production Helm chart on every PR (#354). It mirrors the local
  # gate run by devops: `helm lint` + a full `helm template` rendered with the committed
  # values-prod.example.yaml (which references real-shaped Secret NAMES, so the chart — whose
  # secrets are fail-closed `required` — renders cleanly). This keeps deploy/helm deployable as
  # services + env evolve; a drift between the chart and the source-of-truth compose contract that
  # breaks rendering reddens the build here.
  helm-chart:
    name: "Helm chart lint + template (#354)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.3"
      - name: helm lint
        run: helm lint deploy/helm -f deploy/helm/values-prod.example.yaml
      - name: helm template (render all services against the prod example values)
        run: helm template oraclous deploy/helm -f deploy/helm/values-prod.example.yaml > /tmp/helm-rendered.yaml
      - name: Assert the prod security contract rendered (RLS split + RUN_MODE=prod + no secret literal)
        run: |
          set -euo pipefail
          # RUN_MODE=prod must appear on every workload container (one per Deployment/Job).
          workloads=$(grep -cE '^kind: (Deployment|Job)$' /tmp/helm-rendered.yaml)
          # neo4j-role-init is the one Job that legitimately has no RUN_MODE (cypher-shell only).
          runmodes=$(grep -c 'name: RUN_MODE' /tmp/helm-rendered.yaml)
          echo "workloads=$workloads RUN_MODE_envs=$runmodes (expect RUN_MODE on all but neo4j-role-init)"
          test "$runmodes" -eq "$((workloads - 1))"
          # The runtime app DSNs must use oraclous_app; no dev secret literal may leak.
          grep -q 'oraclous_app:\$(APP_PG_PASSWORD)' /tmp/helm-rendered.yaml
          for bad in dev-internal-key dev-jwt-secret 'oraclous:oraclous@' 'oraclous_app:app@' kgs-writer-pass; do
            if grep -qF "$bad" /tmp/helm-rendered.yaml; then
              echo "SECRET LITERAL LEAK in rendered chart: $bad" >&2; exit 1
            fi
          done
          echo "Helm chart security contract OK."

  # `unit` runs the unit suite. It is intentionally RED during the TDD tests->impl window
  # (a `[tests]` PR lands failing tests for an unbuilt seam), so it is NOT a required gate.
  unit:
    runs-on: ubuntu-latest
    # ADR-021 §1: the fake credential-broker / scripted LLM are now FAIL-CLOSED behind these explicit
    # opt-ins (the literal defaults flipped to real/live). CI is a key-free environment, so it selects
    # the fake runtime EXPLICITLY here — without this, any suite that boots a service through its real
    # lifespan would reach for the real broker / live LLM. The failure-mode tests that assert the
    # real-mode DEFAULT delenv these per-test, so this job env never masks that check.
    env:
      CREDENTIAL_BROKER_MODE: fake
      HARNESS_LLM_MODE: fake
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Unit tests
        run: |
          set +e
          uv run pytest -m unit
          code=$?
          if [ "$code" -eq 5 ]; then echo "No unit tests collected yet."; exit 0; fi
          exit "$code"

  integration:
    runs-on: ubuntu-latest
    # ADR-021 §1: select the key-free fake runtime explicitly (the defaults are now real/live).
    env:
      CREDENTIAL_BROKER_MODE: fake
      HARNESS_LLM_MODE: fake
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Integration tests (real substrate via testcontainers)
        run: |
          set +e
          uv run pytest -m integration
          code=$?
          if [ "$code" -eq 5 ]; then echo "No integration tests collected yet."; exit 0; fi
          exit "$code"

  # The R2 acceptance gate is RETIRED: it verified the hollow R2 deliverables inside the
  # legacy oraclous-core-service (deleted under §15) and several surfaces deferred to R4/R6 (MCP,
  # agent schemas, scope-allocation). R3.5 rebuilt those deliverables for real in the new services;
  # the `r3_5_gate` below + each service's own unit/integration suites + the §22 sign-offs are the
  # live acceptance now.

  worktree-test:
    name: "Per-run worktree isolation probe"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify git repo validity
        run: |
          git rev-parse --is-inside-work-tree
          echo "Toplevel: $(git rev-parse --show-toplevel)"
          echo "HEAD: $(git rev-parse HEAD)"
      - name: git worktree add — detached HEAD
        run: |
          git worktree add /tmp/wt-probe-detached --detach HEAD
          git -C /tmp/wt-probe-detached rev-parse --is-inside-work-tree
      - name: git worktree add — named branch (simulates per-run agent isolation)
        run: |
          git branch wt-ci-probe HEAD
          git worktree add /tmp/wt-probe-branch wt-ci-probe
          git -C /tmp/wt-probe-branch rev-parse --is-inside-work-tree
          git worktree list
      - name: Cleanup and report
        run: |
          git worktree remove /tmp/wt-probe-detached --force
          git worktree remove /tmp/wt-probe-branch --force
          git branch -d wt-ci-probe
          echo "RESULT: git worktree add is fully supported in GitHub Actions."
          echo "Recommendation: restore per-run worktree isolation in agent config."

  # r3_5_gate — the §22 hardened per-service acceptance gate (R3.5). Static half here; the
  # docker-up + integration + smoke steps are added per-service as each is rebuilt (gates 3-5).
  # Gate 6 (Reza sign-off) is the needs-human label on the GitHub issue, not a CI step. Modelled on r2-gate.
  r3_5_gate:
    name: "R3.5 acceptance gate — service architecture + no-hollow + audit"
    runs-on: ubuntu-latest
    # ADR-021 §1: select the key-free fake runtime explicitly (the defaults are now real/live).
    env:
      CREDENTIAL_BROKER_MODE: fake
      HARNESS_LLM_MODE: fake
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Service architecture (STR — enforced per service_status.yaml)
        run: uv run python -m tools.lint.check_service_structure services
      - name: No-hollow (HOL — enforced per service_status.yaml)
        run: uv run python -m tools.lint.check_no_stubs services
      - name: Hollowness audit (true-completion map; informational)
        run: uv run python -m tools.audit.hollowness_audit services

  # Deployed-stack e2e (FUCK_CLAUDE_FUCK_PAPERCLIP.md rules 3-5): builds + brings up the REAL stack
  # and drives every user journey THROUGH THE GATEWAY — no fakes, no mocks, no DB-direct. This is the
  # mechanical form of rule 4 (CTO verifies the real e2e), so it no longer depends on a human running
  # it locally. Keyless by default: the fake harness (deterministic LLM) + the hashing embedder; the
  # BYOM real-LLM leg runs ONLY when the OPENROUTER_API_KEY secret is present.
  e2e:
    name: "Deployed-stack e2e through the gateway (no fakes; rules 3-5)"
    runs-on: ubuntu-latest
    timeout-minutes: 45  # building ~14 service images from scratch + the full stack is the long pole
    env:
      HARNESS_LLM_MODE: fake
      # The application services sit behind `profiles: [services]`; without this, `up` brings up ONLY
      # the infra (postgres/redis/neo4j) and the gateway never starts.
      COMPOSE_PROFILES: services
      # Edge-auth (ADR-018), as deploy/.env sets for a real deployment: the gateway VALIDATES the user
      # JWT and downstream services TRUST the forwarded X-Principal. The compose default is `dev` (only
      # the fixed dev-token), which rejects the real JWTs the e2e registers — so wire the real chain.
      GATEWAY_AUTH_MODE: jwt
      ENGINE_AUTH_MODE: gateway
      HARNESS_AUTH_MODE: gateway
      KGS_AUTH_MODE: gateway
      KRS_AUTH_MODE: gateway
      CRED_BROKER_AUTH_MODE: gateway
      CAPABILITY_REGISTRY_AUTH_MODE: gateway
      CAPABILITY_REGISTRY_BROKER_MODE: real
      # #515 deliver-back: the github-sink reaches the same-stack gitea forge at gitea:3000 (a
      # single-label private host the SSRF gate rejects by default). Relax egress for THIS test stack
      # only (single-tenant; default-OFF in prod; IMDS/link-local stay blocked in either mode). The
      # forge admin/token is minted by the "Arm the gitea deliver-back forge" step below.
      CAPABILITY_REGISTRY_ALLOW_PRIVATE_EGRESS: "true"
      COMPOSE: "docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev-ports.yml"
      COMPOSE_OAUTH: "docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev-ports.yml -f deploy/docker-compose.e2e-oauth.yml"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Build + start the deployed stack (keyless)
        run: $COMPOSE up -d --build --wait
      - name: Wait for the gateway (a skip is NOT a pass — fail if it never comes up)
        run: |
          for _ in $(seq 1 60); do curl -fsS localhost:8006/health >/dev/null 2>&1 && exit 0; sleep 2; done
          echo "::error::gateway :8006 never became healthy"; exit 1
      # #515: mint the gitea admin/token + export GITEA_* so the deliver-back e2e RUNS (not skips on
      # requires_gitea). Same shared script scripts/e2e.sh calls (no drift). Fails loud if the
      # already-healthy gitea cannot be set up — a skip would not count as the O7 proof (rule 3).
      - name: Arm the gitea deliver-back forge (#515 — mint admin/token so the O7 e2e RUNS)
        run: scripts/setup-gitea-e2e.sh >> "$GITHUB_ENV"
      - name: Deterministic e2e through the gateway
        run: uv run pytest tests/e2e -m "e2e and not byom and not oauth" -v -p no:cacheprovider
      - name: OAuth login e2e (a real local dex provider)
        run: |
          $COMPOSE_OAUTH up -d --wait dex
          $COMPOSE_OAUTH up -d --force-recreate --no-deps auth-service
          for _ in $(seq 1 30); do curl -fsS localhost:8006/oauth/providers 2>/dev/null | grep -q '"dex"' && break; sleep 1; done
          uv run pytest tests/e2e -m oauth -v -p no:cacheprovider
      - name: BYOM real-LLM e2e (only when the model-key secret is set)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "OPENROUTER_API_KEY secret not set — skipping the BYOM real-LLM leg"; exit 0
          fi
          HARNESS_LLM_MODE=live $COMPOSE up -d --force-recreate --no-deps harness-runtime-service
          for _ in $(seq 1 30); do curl -fsS localhost:8007/health >/dev/null 2>&1 && break; sleep 1; done
          uv run pytest tests/e2e -m byom -v -p no:cacheprovider
      - name: Stack logs on failure
        if: failure()
        run: $COMPOSE_OAUTH logs --tail 200
      - name: Tear down
        if: always()
        run: $COMPOSE_OAUTH down -v
