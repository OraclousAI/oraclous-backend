name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy tools
      - name: Import contracts (four-layer architecture)
        run: uv run lint-imports
      - name: Organisation-scoping guardrails
        run: uv run python -m tools.lint.check_org_scoping packages services
      - name: Org-scoped-labels YAML schema validator
        run: uv run python -m tools.lint.check_org_scoped_labels_schema
      - name: Test-import hygiene guardrail (TDD-window collection safety)
        run: uv run python -m tools.lint.check_test_imports packages services tests
      - name: Contract fixture integrity (error envelope, ORA-37)
        run: uv run python -m tools.contract.verify_checksums
      - name: Unit tests
        run: |
          set +e
          uv run pytest -m unit
          code=$?
          if [ "$code" -eq 5 ]; then echo "No unit tests collected yet."; exit 0; fi
          exit "$code"

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Integration tests (real substrate via testcontainers)
        run: |
          set +e
          uv run pytest -m integration
          code=$?
          if [ "$code" -eq 5 ]; then echo "No integration tests collected yet."; exit 0; fi
          exit "$code"

  worktree-test:
    name: "Per-run worktree isolation probe (ORAA-130)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify git repo validity
        run: |
          git rev-parse --is-inside-work-tree
          echo "Toplevel: $(git rev-parse --show-toplevel)"
          echo "HEAD: $(git rev-parse HEAD)"
      - name: git worktree add — detached HEAD
        run: |
          git worktree add /tmp/wt-probe-detached --detach HEAD
          git -C /tmp/wt-probe-detached rev-parse --is-inside-work-tree
      - name: git worktree add — named branch (simulates per-run agent isolation)
        run: |
          git branch wt-ci-probe HEAD
          git worktree add /tmp/wt-probe-branch wt-ci-probe
          git -C /tmp/wt-probe-branch rev-parse --is-inside-work-tree
          git worktree list
      - name: Cleanup and report
        run: |
          git worktree remove /tmp/wt-probe-detached --force
          git worktree remove /tmp/wt-probe-branch --force
          git branch -d wt-ci-probe
          echo "RESULT: git worktree add is fully supported in GitHub Actions."
          echo "Recommendation: restore per-run worktree isolation in agent config."
