name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # `lint` is ALWAYS green by design (no test execution) and is the REQUIRED merge-gate
  # status check. It mirrors the .githooks/pre-push hook exactly. Splitting it out from the
  # tests lets the ruleset block avoidable lint/format/type churn WITHOUT freezing ADR-010's
  # two-PR TDD, where `unit`/`integration` are intentionally RED until the `[impl]` lands.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy tools
      - name: Import contracts (four-layer architecture)
        run: uv run lint-imports
      - name: Organisation-scoping guardrails
        run: uv run python -m tools.lint.check_org_scoping packages services
      - name: Org-scoped-labels YAML schema validator
        run: uv run python -m tools.lint.check_org_scoped_labels_schema
      - name: Test-import hygiene guardrail (TDD-window collection safety)
        run: uv run python -m tools.lint.check_test_imports packages services tests
      - name: Neo4j write-role bypass guardrail (ORAA-53 / T6)
        run: uv run python -m tools.lint.check_neo4j_write_role
      - name: Contract fixture integrity (error envelope, ORA-37)
        run: uv run python -m tools.contract.verify_checksums
      - name: Neo4j read-role bypass guardrail (ORAA-58 / T6)
        run: uv run python -m tools.lint.check_neo4j_read_role
      - name: Service architecture guardrail (ORAA-4 §21, R3.5)
        run: uv run python -m tools.lint.check_service_structure services
      - name: No-hollow guardrail (ORAA-4 §22, R3.5)
        run: uv run python -m tools.lint.check_no_stubs services

  # `unit` runs the unit suite. It is intentionally RED during the TDD tests->impl window
  # (a `[tests]` PR lands failing tests for an unbuilt seam), so it is NOT a required gate.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Unit tests
        run: |
          set +e
          uv run pytest -m unit
          code=$?
          if [ "$code" -eq 5 ]; then echo "No unit tests collected yet."; exit 0; fi
          exit "$code"

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Integration tests (real substrate via testcontainers)
        run: |
          set +e
          uv run pytest -m integration
          code=$?
          if [ "$code" -eq 5 ]; then echo "No integration tests collected yet."; exit 0; fi
          exit "$code"

  # The R2 acceptance gate (ORAA-80) is RETIRED: it verified the hollow R2 deliverables inside the
  # legacy oraclous-core-service (deleted under §15) and several surfaces deferred to R4/R6 (MCP,
  # agent schemas, scope-allocation). R3.5 rebuilt those deliverables for real in the new services;
  # the `r3_5_gate` below + each service's own unit/integration suites + the §22 sign-offs are the
  # live acceptance now.

  worktree-test:
    name: "Per-run worktree isolation probe (ORAA-130)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify git repo validity
        run: |
          git rev-parse --is-inside-work-tree
          echo "Toplevel: $(git rev-parse --show-toplevel)"
          echo "HEAD: $(git rev-parse HEAD)"
      - name: git worktree add — detached HEAD
        run: |
          git worktree add /tmp/wt-probe-detached --detach HEAD
          git -C /tmp/wt-probe-detached rev-parse --is-inside-work-tree
      - name: git worktree add — named branch (simulates per-run agent isolation)
        run: |
          git branch wt-ci-probe HEAD
          git worktree add /tmp/wt-probe-branch wt-ci-probe
          git -C /tmp/wt-probe-branch rev-parse --is-inside-work-tree
          git worktree list
      - name: Cleanup and report
        run: |
          git worktree remove /tmp/wt-probe-detached --force
          git worktree remove /tmp/wt-probe-branch --force
          git branch -d wt-ci-probe
          echo "RESULT: git worktree add is fully supported in GitHub Actions."
          echo "Recommendation: restore per-run worktree isolation in agent config."

  # r3_5_gate — the §22 hardened per-service acceptance gate (R3.5). Static half here; the
  # docker-up + integration + smoke steps are added per-service as each is rebuilt (gates 3-5).
  # Gate 6 (Reza sign-off) is the PaperClip needs-human flag, not a CI step. Modelled on r2-gate.
  r3_5_gate:
    name: "R3.5 acceptance gate — service architecture + no-hollow + audit (ORAA-4 §21/§22)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Service architecture (STR — enforced per service_status.yaml)
        run: uv run python -m tools.lint.check_service_structure services
      - name: No-hollow (HOL — enforced per service_status.yaml)
        run: uv run python -m tools.lint.check_no_stubs services
      - name: Hollowness audit (true-completion map; informational)
        run: uv run python -m tools.audit.hollowness_audit services
