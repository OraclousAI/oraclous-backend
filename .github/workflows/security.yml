name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  security-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Security-marked tests (T1–T7 threat coverage)
        run: |
          set +e
          uv run pytest -m security
          code=$?
          if [ "$code" -eq 5 ]; then echo "No security tests collected yet (skeleton)."; exit 0; fi
          exit "$code"
