name: Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - run: uv python install 3.12
      - run: uv sync --all-packages --frozen
      - name: Security-marked tests (T1–T7 threat coverage)
        run: |
          set +e
          uv run pytest -m security
          code=$?
          if [ "$code" -eq 5 ]; then echo "No security tests collected yet (skeleton)."; exit 0; fi
          exit "$code"

      - name: R1 gate — adversarial delegation suite (ORA-37 / T2 verification)
        # The R1 release gate: "R1 ships nothing until this is green" (ORA-37
        # AC #2). Distinct from the permissive marker step above so a missing
        # file or a future no-collection skeleton mode cannot let R1 ship
        # silently — the suite must collect AND pass for this step to succeed.
        # No `if [ -eq 5 ]` escape branch: an empty R1 gate is a failure mode,
        # not a skeleton.
        run: uv run pytest --strict-markers tests/security/test_adversarial_delegation.py
