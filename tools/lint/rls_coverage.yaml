# RLS-coverage manifest (ADR-030 §4) — the scope-aware source of truth for the
# check_rls_coverage guardrail.
#
# Lists the services whose Postgres RLS backstop is REALIZED (per ADR-030's phased,
# service-by-service rollout) and, for each, the org-scoped tables that must have RLS
# enabled+forced+a policy. The guardrail enforces ONLY the services listed here, so a
# not-yet-realized service does not fail CI; as each future slice realizes a service,
# add it here in the same PR. The guardrail also fails if a realized service ships a
# NEW org-scoped storage model (a class with __tablename__ + organisation_id) that is
# absent from its table list — so a new table cannot silently dodge RLS.
#
# `enable_rls_on` (substrate) is the only RLS applier; each table here must be covered
# by an enable_rls_on(...) call in that service's migrations/ (the static half), and
# the integration isolation test proves it bites at the data layer (the DB half).
#
# A service may also declare `exclusions` — org-scoped tables (a model with both
# __tablename__ and organisation_id) that are DELIBERATELY not RLS-enabled, each with a
# `reason`. Some org-scoped tables are read WITHOUT a bound org (login / pre-org / token
# lookup), where an org-keyed RLS policy would fail-close the flow. An exclusion makes that
# decision explicit + reviewable so RLS002 (org-scoped-but-unmanifested) does not fire on it.
schema_version: 1

services:
  # Slice 0 — the first realized service (most sensitive: credentials, tokens, org keys).
  credential-broker-service:
    tables:
      - user_credentials
      - webhook_secrets
      - delegated_tokens
      - org_data_keys
  # Slice 1 — auth-service identity store. RLS the ALWAYS-org-bound tables only; the
  # login/identity/cross-org tables are reached before a single org is bound, so they are
  # documented exclusions (RLS there would fail-close login / pre-org / token-lookup flows).
  auth-service:
    tables:
      - agents
      - agent_credentials
    exclusions:
      - table: org_members
        reason: >-
          login / resolve_active_org enumerate a user's memberships ACROSS orgs
          (organisation_ids_for(user_id) has no org filter) with no single bound org — an
          org-keyed RLS policy would fail-close to zero rows and break LOGIN.
      - table: auth_audit_log
        reason: >-
          organisation_id is NULLABLE — pre-org events (e.g. a failed login before an org is
          resolved) carry no org; an org-keyed policy cannot scope a null-org row.
      - table: org_invitations
        reason: >-
          invitations are looked up by signed token in a pre-membership flow (the invitee is
          not yet a member of, nor scoped to, the org) — accessed before an org is bound.
      - table: oauth_accounts
        reason: >-
          the OAuth callback resolves a provider identity to a user before any org context is
          established (the org is a product of login, not an input to it).
      - table: refresh_tokens
        reason: >-
          refresh rotation looks a token up by jti/family before re-establishing the active org
          (the org is re-derived from the validated token), so the lookup precedes the bound org.
  # Slice (KGS) — knowledge-graph-service: the single-engine clean case. All four org-scoped tables
  # carry a uuid organisation_id and every runtime accessor (web request + Celery worker) binds the
  # org via use_organisation_context before any query, so RLS the full set (no exclusions). Neo4j is
  # out of scope here — RLS is Postgres-only; KGS's Neo4j graph data is isolated by the
  # org-scoped-label / org-property write path, not this manifest.
  knowledge-graph-service:
    tables:
      - knowledge_graphs
      - ingestion_jobs
      - recipes
      - entity_resolutions
  # Slice (engine) — execution-engine-service: the SPLIT case. All four org-scoped tables carry a
  # uuid organisation_id and RLS is enabled on each. The request/driver path + the org-bound Celery
  # task execution bind the org (principal / use_organisation_context) on the org-bound oraclous_app
  # engine, so RLS bites the full set (no exclusions). The three cross-org maintenance sweeps (the
  # reaper list_stale_running + Beat list_enabled_cron) read across orgs on a SEPARATE owner engine
  # that bypasses RLS (the carve, ADR-030 §3) — that is an engine/role split, NOT an RLS exclusion:
  # the tables themselves are fully RLS-enabled, and the per-row settle after a sweep writes through
  # the org-bound engine under org_scope, so every write is policy-scoped. engine_provenance rides
  # along on the org-bound engine (clean).
  execution-engine-service:
    tables:
      - engine_jobs
      - engine_schedules
      - engine_roundtables
      - engine_provenance
  # Slice (capability-registry) — unified capability/tool registry + execution. All four org-scoped
  # tables carry a uuid organisation_id; every runtime accessor binds the org via the engine's
  # org-GUC begin-guard before any query, so RLS the full set (no exclusions). capability_descriptors
  # gets a WIDENED-READ policy (reads admit the caller org OR the PLATFORM_ORG that owns the shared
  # built-in tool catalogue; writes stay strict to the caller org) — still RLS-enabled, so it is
  # listed in `tables` (the coverage check only verifies an enable_rls_on call exists per table; the
  # widened shape is proven by the integration isolation test).
  capability-registry-service:
    tables:
      - tool_instances
      - executions
      - harness_graph_binding
      - capability_descriptors
  # Future slices add: harness-runtime-service, application-gateway-service.
