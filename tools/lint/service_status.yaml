# service_status.yaml — the source of truth for R3.5 per-service enforcement state.
#
# This file gates the two R3.5 structural checkers so that enforcement is OPT-IN PER SERVICE:
# a check fails CI for a service ONLY when that service's flag is flipped to true. This lets the
# checkers ship and run on every push while the hollow services are rebuilt one at a time — a
# service that has not been rebuilt yet is reported (informational) but does not break the build.
#
# Flags per service:
#   structure_enforced: true  -> tools.lint.check_service_structure FAILS on STR violations for this service
#                                (flip true once the service is rebuilt to the §21 canonical layout)
#   claimed_done:       true  -> tools.lint.check_no_stubs FAILS on HOL violations for this service
#                                (flip true only when the §22 8-gate per-service DoD is met; a stub then
#                                 can never be marked done — flipping this is what makes "hollow = not done")
#   port_source:        true  -> this dir is a legacy port-source kept until its logic is ported (read-only ref)
#   deletable:          false -> may NOT be deleted (salvage-then-delete is human-gated, ORAA-4 §15/§23)
#
# Canonical authority: ORAA-4 §21/§22/§23; narrative: oraclous-knowledge/engineering/service-architecture-standard.md.

services:
  # R3.5: all six services rebuilt real, end-to-end, and §22-signed-off (claimed_done locks no-stubs).
  knowledge-graph-service:
    release: R3.5            # service #1 — rebuilt to §21 across S1-S5; structure now ENFORCED
    structure_enforced: true
    claimed_done: true       # §22 8-gate sign-off accepted — no-stubs ENFORCED
  knowledge-retriever-service:
    release: R3.5            # service #2 — rebuilt to §21 (read-only retrieval); structure ENFORCED
    structure_enforced: true
    claimed_done: true       # §22 8-gate sign-off accepted — no-stubs ENFORCED
    # DOCUMENTED §21 deviation (#301): this is a THIN READ-ONLY service. It has no `domain/`
    # (no business-logic aggregates — it parses a query and reads Neo4j/the query-cache) and no
    # `models/` (it owns no relational schema — its only persistence is a Redis query cache, which
    # is repository-layer access, not ORM declarations). §21 already makes `domain/` optional ("only
    # if the service has domain rules"); this records the absence as INTENTIONAL, not an unfinished
    # gap, so the read-only shape is an accepted, reviewed exception rather than implicit.
    structure_exceptions:
      - layer: domain
        reason: read-only service; no business-logic domain aggregates (parse query -> read substrate)
      - layer: models
        reason: owns no relational schema; only persistence is a Redis query cache (repository access)
  auth-service:
    release: R3.5            # service #3 — full identity: users/orgs/members/invites/SA/OAuth; ENFORCED
    structure_enforced: true
    claimed_done: true       # §22 8-gate sign-off accepted — no-stubs ENFORCED
  credential-broker-service:
    release: R3.5            # service #4 — encrypted creds + runtime OAuth + delegation; ENFORCED
    structure_enforced: true
    claimed_done: true       # §22 8-gate sign-off accepted — no-stubs ENFORCED
  capability-registry-service:
    release: R3.5            # service #5 — ported from oraclous-core-service; DONE (Reza §22 sign-off)
    structure_enforced: true
    claimed_done: true       # §22 8-gate sign-off accepted (Reza ran both smokes) — no-stubs ENFORCED
  application-gateway-service:
    release: R3.5            # service #6 — reverse-proxy edge; structure ENFORCED (GW-1)
    structure_enforced: true
    claimed_done: true       # §22 8-gate sign-off accepted — no-stubs ENFORCED
  harness-runtime-service:
    release: R4              # R4 — full OHM harness runtime, built S1-S6 (all merged)
    structure_enforced: true # rebuilt to the §21 canonical layout — structure ENFORCED
    # Code-complete (S1-S6): OHM load+signatures, tool-use loop, governance, live LLM (BYOM),
    # human-actor dispatch, consciousness hook + the R5 HITL claim/complete/resume endpoints.
    claimed_done: true       # §22 Reza sign-off accepted (smoke green) — no-stubs ENFORCED
  execution-engine-service:
    release: R5              # R5 — durable execution engine, all 7 slices merged (#185-#193)
    structure_enforced: true # built to the §21 canonical layout — structure ENFORCED
    # Jobs/retry/timeout/reaper, task board, mid-loop HITL resume, schedules, round-table.
    claimed_done: true       # §22 Reza sign-off accepted (consolidated smoke green) — no-stubs ENFORCED

# Legacy port-source registry — now EMPTY. oraclous-core-service (~6,300 LOC) was the port-source for
# service #5 (capability-registry); its logic is ported+tested+signed-off and the dead shadow was
# removed under the §15 destructive-change protocol with explicit Reza approval (R3.5). No legacy
# port-sources remain; re-add an entry here only when a new salvage-then-delete is in flight.
legacy: {}
